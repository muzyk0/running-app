name: CI

on:
  push:
    branches:
      - main
      - master
      - running-app-mvp-implementation-plan
  pull_request:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 36 SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Android assemble, tests, lint, and coverage
        run: ./scripts/android-ci.sh

      - name: Upload Android reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-reports
          path: |
            android-app/app/build/reports/tests/testDebugUnitTest
            android-app/app/build/reports/lint-results-debug.html
            android-app/app/build/reports/lint-results-debug.xml
            android-app/app/build/reports/jacoco/jacocoDebugUnitTestReport

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go 1.26.1
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: backend/go.mod

      - name: Backend tests, coverage, vet, and docker build
        run: ./scripts/backend-ci.sh

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
